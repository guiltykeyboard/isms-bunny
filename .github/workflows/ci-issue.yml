name: ci-issue-manager

on:
  workflow_run:
    workflows:
      - "lint"
      - "loc-badge"
      - "pip-audit"
      - "npm-audit"
      - "nightly"
    types: [completed]

jobs:
  handle-lint-result:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Handle lint failure/success
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = context.payload.workflow;
            const run = context.payload.workflow_run;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const wfName = run.name || workflow.name || run.display_title || \"ci\";
            const label = wfName.includes('loc') ? \"ci:loc\" : \"ci:lint\";
            const title = `[CI] ${wfName} ${run.conclusion === 'failure' ? 'failed' : 'fixed'} on ${run.head_branch || run.display_title}`;

            // Ensure label exists
            try {
              await github.rest.issues.getLabel({owner, repo, name: label});
            } catch (e) {
              await github.rest.issues.createLabel({
                owner, repo, name: label,
                color: "d73a4a",
                description: "Auto-created for lint workflow status"
              });
            }

            // Find open lint issues
            const { data: issues } = await github.rest.issues.listForRepo({
              owner, repo, state: "open", labels: label, per_page: 30,
            });

            if (run.conclusion === "failure") {
              const body = [
                `Lint workflow failed.`,
                `Run: ${run.html_url}`,
                `Branch: ${run.head_branch}`,
                `Commit: ${run.head_sha}`,
                `Event: ${run.event}`
              ].join("\n");

              if (issues.length > 0) {
                // Update first existing issue
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issues[0].number, body
                });
              } else {
                await github.rest.issues.create({
                  owner, repo,
                  title,
                  body,
                  labels: [label]
                });
              }
            } else if (run.conclusion === "success") {
              // Close any open lint issues with a success note
              for (const issue of issues) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issue.number,
                  body: `Lint workflow is now passing. Run: ${run.html_url}`
                });
                await github.rest.issues.update({
                  owner, repo, issue_number: issue.number, state: "closed"
                });
              }
            }
