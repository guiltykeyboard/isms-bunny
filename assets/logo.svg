<svg width="220" height="240" viewBox="0 0 220 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fur" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5C36A6"/>
      <stop offset="100%" stop-color="#4B2C82"/>
