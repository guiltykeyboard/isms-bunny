  </defs>

  <rect width="220" height="240" rx="28" fill="#0F1116"/>

  <!-- ears -->
  <path d="M82 38 C78 16 96 8 108 12 C116 14 118 28 116 42 L110 80 L90 80 Z" fill="url(#fur)" stroke="#2E1A52" stroke-width="4"/>
  <path d="M138 38 C142 16 124 8 112 12 C104 14 102 28 104 42 L110 80 L130 80 Z" fill="url(#fur)" stroke="#2E1A52" stroke-width="4"/>

  <!-- head -->
