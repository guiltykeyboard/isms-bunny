  <!-- headband -->
  <rect x="42" y="96" width="136" height="32" rx="10" fill="url(#band)"/>
  <path d="M178 110 L198 118 L178 126 Z" fill="url(#band)"/>

  <!-- eyes -->
  <circle cx="92" cy="116" r="10" fill="#0F1116" stroke="#F4F5FB" stroke-width="4"/>
  <circle cx="128" cy="116" r="10" fill="#0F1116" stroke="#F4F5FB" stroke-width="4"/>

  <!-- nose/mouth -->
  <path d="M110 135 L104 143 L116 143 Z" fill="#F4F5FB"/>
  <path d="M104 145 Q110 150 116 145" stroke="#F4F5FB" stroke-width="3" fill="none"/>

