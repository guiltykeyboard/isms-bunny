version: "3.9"

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  app:
    image: ghcr.io/isms-bunny/app:dev
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env.example
    environment:
      - DATABASE_URL=postgresql://isms:isms@db:5432/isms
      - REDIS_URL=redis://cache:6379/0
      - STORAGE_BACKEND=${STORAGE_BACKEND:-s3}
      - S3_BUCKET=${S3_BUCKET:-isms-bunny-dev}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ENDPOINT=${S3_ENDPOINT:-https://s3.wasabisys.com}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-changeme}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-changeme}
      - MINIO_ENABLE=${MINIO_ENABLE:-false}
    depends_on:
      - db
      - cache

  worker:
    image: ghcr.io/isms-bunny/app:dev
    command: ["worker"]
    env_file:
      - ../.env.example
    environment:
      - DATABASE_URL=postgresql://isms:isms@db:5432/isms
      - REDIS_URL=redis://cache:6379/0
      - STORAGE_BACKEND=${STORAGE_BACKEND:-s3}
    depends_on:
      - db
      - cache

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=isms
      - POSTGRES_PASSWORD=isms
      - POSTGRES_DB=isms
    volumes:
      - db_data:/var/lib/postgresql/data

  cache:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - cache_data:/data

  minio:
    image: quay.io/minio/minio:RELEASE.2024-01-13T07-53-03Z
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    deploy:
      replicas: ${MINIO_ENABLE:-0}
    profiles: ["dev"]

volumes:
  caddy_data:
  caddy_config:
  db_data:
  cache_data:
  minio_data:
